repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v5.0.0"
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-docstring-first
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]

      - id: ruff-check
        name: ruff check
        entry: ruff check
        args: [--fix]
        language: system
        types: [python]

      - id: mypy
        name: mypy
        entry: mypy src
        args: [--disallow-untyped-defs, --disallow-incomplete-defs, --check-untyped-defs]
        language: system
#        stages: [manual]
        pass_filenames: false
        types: [python]

      - id: pytest
        name: pytest
        entry: pytest -v src/test
        language: system
        stages: [manual]
        pass_filenames: false
        always_run: true
        verbose: true

exclude: |
  (?x)^(
    \.venv/|
    src/regrid_wrapper/app/chem_regrid\.py
  )
